openapi: 3.0.3
info:
  title: XParse Parse Sync API
  description: |
    智能文档解析
  version: 1.3.0
  contact:
    name: TextIn API Team

servers:
  - url: https://api.textin.com
    description: 生产环境

security:
  - AppIdAuth: []
    SecretCodeAuth: []

paths:
  /api/v1/xparse/parse/sync:
    post:
      summary: 文档解析
      description: |
        将非结构化文档（image/pdf/word/html/excel/ppt/txt等）解析为 AI 友好的结构化数据（JSON、Markdown），包含丰富的元数据（可追溯、可解释、可验证）
      operationId: parseSync
      tags:
        - XParse Parse
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 上传文档文件，与 file_url 二选一
                file_url:
                  type: string
                  description: 文档 URL，与 file 二选一
                config:
                  allOf:
                    - $ref: '#/components/schemas/ParseConfig'
                  example:
                    schema_version: "1.3.0"
                    document:
                      password: "example-pdf-password"
                    capabilities:
                      include_hierarchy: true
                      include_inline_objects: true
                      include_char_details: true
                      include_image_data: true
                      include_table_structure: true
                      pages: true
                      title_tree: true
                      table_view: "html"
                    scope:
                      page_range: "1-2"
                    config:
                      force_engine: "textin"
                      engine_params:
                        formula_level: 0
                        image_output_type: "url"
            encoding:
              file:
                contentType: application/octet-stream
              config:
                contentType: application/json
      responses:
        '200':
          description: 解析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  summary: 成功示例
                  value:
                    code: 200
                    message: "success"
                    data:
                      schema_version: "1.3.0"
                      file_id: "doc_7f3a2b"
                      job_id: "job_x9k2m"
                      success_count: 2
                      metadata:
                        filename: "quarterly_report.pdf"
                        filetype: "application/pdf"
                        page_count: 2
                        data_source:
                          record_locator:
                            protocol: "file"
                            remote_file_path: "/projects/demo/quarterly_report.pdf"
                          url: "file:///projects/demo/quarterly_report.pdf"
                      markdown: "# 检验结果\n\n<table>\n  <thead>\n    <tr><th>项目</th><th>公式项</th><th>参考范围</th></tr>\n  </thead>\n  <tbody>\n    <tr><td>空腹血糖</td><td>x^2+1</td><td>3.9-6.1</td></tr>\n  </tbody>\n</table>\n\n乙方签字：李四\n\n设违约金函数f(x)=x^2+1。\n该违约金函数适用于逾期超过30日的场景。"
                      elements:
                        - element_id: "el_001"
                          type: "Title"
                          text: "检验结果"
                          page_number: 1
                          coordinates: [0.10, 0.12, 0.32, 0.12, 0.32, 0.16, 0.10, 0.16]
                          metadata:
                            category_depth: 0
                            children_ids: ["el_002", "el_003", "el_004", "el_005"]
                            is_continuation: false
                            data_source:
                              record_locator:
                                protocol: "file"
                                remote_file_path: "/projects/demo/quarterly_report.pdf"
                              url: "file:///projects/demo/quarterly_report.pdf"
                        - element_id: "el_002"
                          type: "Table"
                          text: "项目 公式项 参考范围\n空腹血糖 x^2+1 3.9-6.1"
                          page_number: 1
                          coordinates: [0.10, 0.20, 0.82, 0.20, 0.82, 0.36, 0.10, 0.36]
                          metadata:
                            parent_id: "el_001"
                            ref_element_id: "el_001"
                            is_continuation: false
                            data_source:
                              record_locator:
                                protocol: "file"
                                remote_file_path: "/projects/demo/quarterly_report.pdf"
                              url: "file:///projects/demo/quarterly_report.pdf"
                          table_structure:
                            rows: 2
                            cols: 3
                            cells:
                              - cell_id: "tbl_001_r1_c1"
                                row: 1
                                col: 1
                                row_span: 1
                                col_span: 1
                                content_type: "text"
                                text: "项目"
                                coordinates: [0.10, 0.20, 0.26, 0.20, 0.26, 0.24, 0.10, 0.24]
                              - cell_id: "tbl_001_r2_c2"
                                row: 2
                                col: 2
                                row_span: 1
                                col_span: 1
                                content_type: "formula"
                                text: "x^2+1"
                                coordinates: [0.33, 0.24, 0.52, 0.24, 0.52, 0.28, 0.33, 0.28]
                                char_details: 
                                  - index: 0
                                    text: "x"
                                    coordinates: [0.33, 0.24, 0.34, 0.24, 0.34, 0.28, 0.33, 0.28]
                                    recognition:
                                      confidence: 0.998
                                      candidates:
                                        - text: "8"
                                          confidence: 0.998
                        - element_id: "el_003"
                          type: "Image"
                          sub_type: "diagram"
                          text: ""
                          page_number: 1
                          coordinates: [0.56, 0.20, 0.80, 0.20, 0.80, 0.34, 0.56, 0.34]
                          image_data:
                            image_url: "https://example.com/fig-1.png"
                            mime_type: "image/png"
