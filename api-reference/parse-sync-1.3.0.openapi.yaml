                            description: "一张展示签署流程的流程图"
                          metadata:
                            parent_id: "el_001"
                            width: 640
                            height: 360
                            data_source:
                              record_locator:
                                protocol: "file"
                                remote_file_path: "/projects/demo/quarterly_report.pdf"
                              url: "file:///projects/demo/quarterly_report.pdf"
                        - element_id: "el_004"
                          type: "NarrativeText"
                          text: "乙方签字：李四"
                          page_number: 1
                          coordinates: [0.10, 0.40, 0.30, 0.40, 0.30, 0.46, 0.10, 0.46]
                          metadata:
                            parent_id: "el_001"
                            has_inline_objects: true
                            inline_object_types: ["handwriting"]
                            is_continuation: false
                            data_source:
                              record_locator:
                                protocol: "file"
                                remote_file_path: "/projects/demo/quarterly_report.pdf"
                              url: "file:///projects/demo/quarterly_report.pdf"
                          objects:
                            - object_id: "obj_001"
                              type: "handwriting"
                              text: "李四"
                              text_range: [5, 7]
